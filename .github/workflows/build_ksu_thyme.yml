name: Build Xiaomi 10S Kernel with KernelSU
on:
  workflow_dispatch: # 手動觸發編譯

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: 安装编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev libncurses-dev git curl

          # 建立工具链目录
          mkdir -p $GITHUB_WORKSPACE/clang
          
          # 方案：改用 Proton Clang 或类似的预编译包，下载更稳定
          curl -L https://github.com -o clang.tar.gz
          tar -C $GITHUB_WORKSPACE/clang --strip-components=1 -zxvf clang.tar.gz

      - name: 拉取内核源码并集成 KernelSU
        run: |
          git clone --depth=1 https://github.com -b 13 kernel-source
          cd kernel-source
          
          # 集成最新的 KernelSU main 分支 (最新开发版)
          curl -LSs "https://githubusercontent.com" | bash -s main
          
          # 自动修正 thyme_defconfig 配置
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/thyme_defconfig
          # 针对 4.19 内核关闭必要的安全校验以顺利通过编译
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/thyme_defconfig


      - name: 集成最新 KernelSU
        working-directory: kernel-source
        run: |
          # 這裡會拉取 KernelSU 官方最新的 main 分支代碼
          curl -LSs "https://githubusercontent.com" | bash -s main
          # 強制開啟 KPROBES 配置（4.19 核心必須）
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/thyme_defconfig

      - name: 开始编译
        working-directory: kernel-source
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          make O=out thyme_defconfig
          make -j$(nproc --all) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LD=ld.lld \
                      AR=llvm-ar \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip

      - name: 上傳編譯產物
        uses: actions/upload-artifact@v4  # 升級至 v4
        with:
          name: KernelSU-Xiaomi10S-Latest
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
          compression-level: 9 # v4 支持設置壓縮級別，推薦開啟以節省空間
