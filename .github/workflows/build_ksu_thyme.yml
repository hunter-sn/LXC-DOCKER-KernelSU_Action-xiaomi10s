name: Build Xiaomi 10S Kernel with KernelSU
on:
  workflow_dispatch: # 手動觸發編譯

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: 安装编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev libncurses-dev git curl
          
          # 建立工具链目录
          mkdir -p $GITHUB_WORKSPACE/clang
          
          # 使用更稳定的 Clang 下载链接 (Android 官方 AOSP 预编译版本)
          # 这里改用直接下载特定的版本号，避免使用带有特殊字符的链接导致 curl 报错
          curl -L https://googlesource.com -o clang.tar.gz
          tar -C $GITHUB_WORKSPACE/clang -zxvf clang.tar.gz
          
          # 下载交叉编译工具链 (GCC 兼容性)
          mkdir -p $GITHUB_WORKSPACE/gcc64
          curl -L https://googlesource.com -o gcc64.tar.gz
          tar -C $GITHUB_WORKSPACE/gcc64 -zxvf gcc64.tar.gz

      - name: 拉取内核源码并集成 KernelSU
        run: |
          git clone --depth=1 https://github.com -b 13 kernel-source
          cd kernel-source
          
          # 集成最新的 KernelSU (使用 main 分支以超越 0.9.5)
          curl -LSs "https://githubusercontent.com" | bash -s main
          
          # 必须针对 4.19 内核手动开启配置
          sed -i 's/CONFIG_KPROBES is not set/CONFIG_KPROBES=y/g' arch/arm64/configs/thyme_defconfig
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/thyme_defconfig


      - name: 集成最新 KernelSU
        working-directory: kernel-source
        run: |
          # 這裡會拉取 KernelSU 官方最新的 main 分支代碼
          curl -LSs "https://githubusercontent.com" | bash -s main
          # 強制開啟 KPROBES 配置（4.19 核心必須）
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/thyme_defconfig
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/thyme_defconfig

      - name: 開始編譯
        working-directory: kernel-source
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          make O=out thyme_defconfig
          make -j$(nproc --all) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CLANG_TRIPLE=aarch64-linux-gnu- \
                      CROSS_COMPILE=aarch64-linux-android- \
                      CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: 上傳編譯產物
        uses: actions/upload-artifact@v4  # 升級至 v4
        with:
          name: KernelSU-Xiaomi10S-Latest
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
          compression-level: 9 # v4 支持設置壓縮級別，推薦開啟以節省空間
